# .github/workflows/build.yml
name: Build Terminal Velocity

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - name: Package Extension
        run: npx vsce package
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: terminal-velocity
          path: terminal-velocity-*.vsix