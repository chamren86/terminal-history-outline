name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile

    - name: Run tests
      run: npm test

    - name: Package Extension
      run: npx vsce package

    - name: Upload VSIX
      if: github.event_name == 'push' && github.repository_owner == 'chamren86' && env.ACTIONS_RUNTIME_TOKEN != ''
      uses: actions/upload-artifact@v4
      with:
        name: terminal-velocity
        path: terminal-velocity-*.vsix
        retention-days: 30